models:
  - name: stg_jaffeshop__customer
    description: grain is to have 1 unique customer 
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
            
  - name: stg_jaffeshop__orders
    description: one order per row
    columns:
      - name: order_id
        description: primary key for order table
        data_tests:
          - unique
          - not_null
      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - completed
                  - shipped
                  - returned
                  - placed
                  - return_pending
      - name: customer_id
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id                  